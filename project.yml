name: PicToolPro
options:
  bundleIdPrefix: com.pictool
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_NAME: "PicTool Pro"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  PicToolPro:
    type: application
    platform: macOS
    sources:
      - path: PicToolPro/Sources
      - path: PicToolPro/Resources
    settings:
      base:
        INFOPLIST_FILE: PicToolPro/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PicToolPro/Resources/PicToolPro.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.pictool.PicToolPro
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    entitlements:
      path: PicToolPro/Resources/PicToolPro.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true

  PicToolProTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: PicToolPro
    settings:
      base:
        INFOPLIST_FILE: Tests/Info.plist
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PicTool Pro.app/Contents/MacOS/PicTool Pro"

schemes:
  PicToolPro:
    build:
      targets:
        PicToolPro: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PicToolProTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
